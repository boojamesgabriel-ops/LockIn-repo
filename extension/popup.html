<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockIn</title>
    <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
<section class="popup-section">
    <div class="header-compact-container">
        <div class="header-text-streak">
            <div class="header-subheader-container">
                <span class="header-compact-text">
                    LockIn
                </span>

                <span class="subheader-compact-text">
                    Stay Lock in and productive
                </span>
            </div>

            <div class="header-right">
                <div>
                    <span class="streak-header">
                        <img src="icons/fire.png" class="streak-icon">
                        <span class="streak-count">0</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="progress-bar-wrapper">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>

            <div class="bar-percent-container">
                <span class="progress-text">
                    Progress Today
                </span> 

                <span class="progress-percent">
                    77% <!--Should be dynamic too-->
                </span>
            </div>
        </div>
    </div>

        <div class="body-wrapper">
            <div class="body-container">
                <div class="mascot-container">
                    <img src="icons/mascot3.png" class="mascot-icon">

                    <span class="dynamic-motivation-text">
                        Strive to be 1% better today than you were yesterday.
                    </span>
                </div>

                <div class="session-wrapper">

                    <div class="today-goal-wrapper">
                        <div class="today-container">
                            <span class="today-text">
                                CURRENT
                            </span>

                            <span class="today-time">
                                <span class="hour">0h</span> 
                                <span class="mins">0m</span>
                            </span>
                        </div>

                        <div class="goal-container">
                            <span class="goal-text">
                                DAILY GOAL
                            </span>

                            <span class="goal-time">
                                <span class="hour">0h</span> 
                                <span class="mins">0m</span> 
                            </span>
                        </div>
                    </div>

                    <div class="session-output"></div>

                    <span class="session-header-text">QUICK SESSION</span>

                    <div class="quick-sessions-container">
                        <button class="fifteenMin-btn">
                            <span class="session-header">
                                15m
                            </span>

                            <span class="session-subheader">
                                quick
                            </span>
                        </button>

                        <button class="thirtyMin-btn">
                            <span class="session-header">
                                30m
                            </span>

                            <span class="session-subheader">
                                default
                            </span>
                        </button>
                        
                        <button class="fortyfiveMin-btn">
                            <span class="session-header">
                                45m
                            </span>

                            <span class="session-subheader">
                                deep
                            </span>
                        </button>

                        <button class="sixtyMin-btn">
                            <span class="session-header">
                                60m
                            </span>

                            <span class="session-subheader">
                                flow
                            </span>
                        </button>
                    </div>
                    
                </div>

                <div class="start-session-container">
                    <button class="start-btn">
                        <img src="icons/play2.png" class="start-icon">
                        Start Session
                    </button>
                </div>

                <div class="view-session-container">
                    <button class="view-btn" id="view-details-btn">
                        <img src="icons/down.png" class="view-icon">
                        View Details
                    </button>
                </div>
            </div>
        </div>
    </section>

    <div class="confirmation-overlay" id="confirmation-overlay">
        <div class="confirmation-dialog">
            <span class="confirmation-text" id="confirmation-text"></span>
            <div class="confirmation-buttons">
                <button class="confirmation-btn yes-btn" id="confirm-yes">Yes</button>
                <button class="confirmation-btn no-btn" id="confirm-no">No</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
